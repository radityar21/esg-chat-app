version: 1
frontend:
  phases:
    preBuild:
      commands:
        - cd esg-chat-app-react
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: esg-chat-app-react/dist
    files:
      - '**/*'
  cache:
    paths:
      - esg-chat-app-react/node_modules/**/*
